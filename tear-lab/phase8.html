<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verlet Tear Lab — Phase 8: Audio</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #2a2a2a;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: #bbb;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  h1 {
    font-size: 13px;
    font-weight: normal;
    margin: 0;
    opacity: 0.7;
    letter-spacing: 0.03em;
  }
  canvas {
    background: #2f2f2f;
    border: 1px solid #222;
    display: block;
    cursor: grab;
    touch-action: none;
  }
  canvas.dragging { cursor: grabbing; }
</style>
</head>
<body>
<h1>Phase 8 — audio: break-rate-driven layered rip sounds</h1>
<canvas id="c" width="800" height="600"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const offCanvas = document.createElement('canvas');
  offCanvas.width = W;
  offCanvas.height = H;
  const offCtx = offCanvas.getContext('2d');

  // ── Audio config ────────────────────────────────────────────────────────────

  const AUDIO_FILES = [
    'audio/slow.aac',
    'audio/medium.aac',
    'audio/medium_fast.aac',
    'audio/fast.aac',
  ];

  // How much the gain blends overlap between adjacent tracks (1/3 of the [0,1] spectrum).
  // Triangular interpolation: each track is dominant in its 1/3 of the spectrum
  // and linearly fades into its neighbours across the overlap.
  const BLEND_WIDTH = 1 / 3;
  const BLEND_POSITIONS = [0, 1 / 3, 2 / 3, 1];

  // Break-rate (smoothed breaks/frame) thresholds for the blend spectrum.
  // Log scale so the perceptual difference between slow and fast feels linear.
  const BLEND_RATE_MIN = 3;   // below this → silence; at this → all-slow
  const BLEND_RATE_MAX = 40;  // at or above this → all-fast

  const RIPPING_THRESHOLD = 1.2; // smoothed break rate above which audio plays

  // Overlap between successive loop iterations of the same track (seconds).
  // Must be <= the fade-out duration baked into the audio files (0.10s).
  const LOOP_OVERLAP = 0.09;

  // Gain ramp durations (seconds).
  const RAMP_MASTER_IN  = 0.12;
  const RAMP_MASTER_OUT = 0.08;
  const RAMP_BLEND      = 0.08;

  // EMA alpha for break-rate smoothing.
  const BREAK_SMOOTH = 0.35;

  // ── AudioManager ────────────────────────────────────────────────────────────

  class AudioManager {
    constructor() {
      this.ctx        = null;
      this.masterGain = null;
      this.trackGains = [];  // GainNode[4]: blend control
      this.slots      = [null, null, null, null]; // looping slot per track
      this.buffers    = [];  // AudioBuffer[4]
      this.isRipping  = false;
      this.status     = 'no ctx';
    }

    // Call on first user gesture to unlock the AudioContext and begin loading.
    ensureContext() {
      if (this.ctx) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return;
      }
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();

      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.setValueAtTime(0, this.ctx.currentTime);
      this.masterGain.connect(this.ctx.destination);

      for (let i = 0; i < 4; i++) {
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0, this.ctx.currentTime);
        g.connect(this.masterGain);
        this.trackGains.push(g);
      }

      this.status = 'loading';
      this._loadBuffers();
    }

    async _loadBuffers() {
      const results = await Promise.all(AUDIO_FILES.map(async (url, i) => {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const ab  = await res.arrayBuffer();
          return await this.ctx.decodeAudioData(ab);
        } catch (e) {
          console.error(
            `Audio: failed to load "${url}": ${e.message}\n` +
            `If you opened this file directly, serve it via a local server instead:\n` +
            `  npm run dev  →  http://localhost:5173/tear-lab/phase8.html`
          );
          this.status = `load error: ${e.message}`;
          return null;
        }
      }));
      this.buffers = results;
      if (results.every(b => b === null)) {
        this.status = 'load failed — need HTTP server';
      } else {
        this.status = 'ready';
      }
    }

    // Start one looping "slot" for track i.  Each iteration plays the buffer,
    // then schedules the next to start LOOP_OVERLAP seconds before it ends —
    // the baked-in fade-out of one overlaps the fade-in of the next.
    _startSlot(i) {
      const buf  = this.buffers[i];
      if (!buf) return null;
      const dest = this.trackGains[i];
      const slot = { active: true, src: null, timeout: null };

      const playNext = () => {
        if (!slot.active || !this.ctx) return;
        const src = this.ctx.createBufferSource();
        src.buffer = buf;
        src.connect(dest);
        src.start();
        slot.src = src;
        const nextIn = Math.max(10, (buf.duration - LOOP_OVERLAP) * 1000);
        slot.timeout = setTimeout(playNext, nextIn);
      };

      playNext();
      return slot;
    }

    _stopSlot(slot) {
      if (!slot) return;
      slot.active = false;
      clearTimeout(slot.timeout);
      try { slot.src?.stop(); } catch (_) {}
    }

    // Compute per-track gains from a blend position in [0, 1].
    //
    // Each track fades in over the segment between the previous track's position
    // and its own.  The fastest currently-active track always has the highest gain:
    // gains are weighted by DECAY^(stepsBelow) so each slower track is DECAY×
    // quieter than the next faster one.
    _blendGains(blend) {
      const DECAY = 0.45;

      // raw[i]: how faded-in track i is (0 = silent, 1 = fully on)
      const raw = BLEND_POSITIONS.map((pos, i) => {
        if (i === 0) return 1; // slow always on while ripping
        const start = BLEND_POSITIONS[i - 1];
        return Math.min(1, Math.max(0, (blend - start) / (pos - start)));
      });

      // Index of the fastest track with any signal
      let maxActive = 0;
      for (let i = 0; i < 4; i++) if (raw[i] > 0) maxActive = i;

      // fastest active = full raw gain; each step slower loses DECAY×
      return raw.map((r, i) => r * Math.pow(DECAY, maxActive - i));
    }

    // Map a smoothed break rate to [0, 1] on a log scale.
    _rateToBlend(rate) {
      if (rate <= BLEND_RATE_MIN) return 0;
      return Math.min(1, Math.log(rate / BLEND_RATE_MIN) /
                         Math.log(BLEND_RATE_MAX / BLEND_RATE_MIN));
    }

    // Called every frame with the current smoothed break rate.
    update(smoothRate) {
      if (!this.ctx || !this.buffers[0]) return;

      const nowRipping = smoothRate > RIPPING_THRESHOLD;
      const now = this.ctx.currentTime;

      if (nowRipping && !this.isRipping) {
        // ── Ripping starts ──────────────────────────────
        this.isRipping = true;
        for (let i = 0; i < 4; i++) {
          this.slots[i] = this._startSlot(i);
        }
        this.masterGain.gain.cancelScheduledValues(now);
        this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, now);
        this.masterGain.gain.linearRampToValueAtTime(1, now + RAMP_MASTER_IN);
      } else if (!nowRipping && this.isRipping) {
        // ── Ripping ends ────────────────────────────────
        this.isRipping = false;
        this.masterGain.gain.cancelScheduledValues(now);
        this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, now);
        this.masterGain.gain.linearRampToValueAtTime(0, now + RAMP_MASTER_OUT);
        const slotsCopy = [...this.slots];
        // Stop source nodes after the master fade has completed.
        setTimeout(() => slotsCopy.forEach(s => this._stopSlot(s)), 200);
        this.slots = [null, null, null, null];
      }

      // ── Update blend gains every frame while ripping ─
      if (this.isRipping) {
        const blend  = this._rateToBlend(smoothRate);
        const gains  = this._blendGains(blend);
        for (let i = 0; i < 4; i++) {
          const g = this.trackGains[i];
          g.gain.cancelScheduledValues(now);
          g.gain.setValueAtTime(g.gain.value, now);
          g.gain.linearRampToValueAtTime(gains[i], now + RAMP_BLEND);
        }
        const label = blend < 0.17 ? 'slow'
                    : blend < 0.5  ? 'slow↔medium'
                    : blend < 0.83 ? 'medium↔mfast'
                    :                'fast';
        this.status = `rip:${label} (${smoothRate.toFixed(1)})`;
      } else {
        this.status = smoothRate > 0.1
          ? `decay:${smoothRate.toFixed(1)}`
          : 'silent';
      }
    }
  }

  const audio = new AudioManager();

  // ── Physics setup (unchanged from Phase 7) ──────────────────────────────────

  class Point {
    constructor(x, y, r, c) {
      this.x = x;
      this.y = y;
      this.old_x = x;
      this.old_y = y;
      this.pinned = false;
      this.fixed = false;
      this.r = r;
      this.c = c;
    }
  }

  class Constraint {
    constructor(p1, p2) {
      this.p1 = p1;
      this.p2 = p2;
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      this.restLength = Math.hypot(dx, dy);
      this.broken = false;
      this.tearable = false;
      this.pathIndex = -1;
    }
  }

  const COLS = 160;
  const ROWS = 30;
  const SPACING = 3.5;
  const stripW = (COLS - 1) * SPACING;
  const stripH = (ROWS - 1) * SPACING;
  const originX = (W - stripW) / 2;
  const originY = 60;

  const points = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = new Point(originX + c * SPACING, originY + r * SPACING, r, c);
      p.i = r * COLS + c;
      if (r === ROWS - 1) {
        p.pinned = true;
        p.fixed = true;
      }
      points.push(p);
    }
  }

  const idx = (r, c) => r * COLS + c;

  const hC = Array.from({ length: ROWS }, () => new Array(COLS - 1));
  const vC = Array.from({ length: ROWS - 1 }, () => new Array(COLS));
  const constraints = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const ct = new Constraint(points[idx(r, c)], points[idx(r, c + 1)]);
      hC[r][c] = ct;
      constraints.push(ct);
    }
  }
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS; c++) {
      const ct = new Constraint(points[idx(r, c)], points[idx(r + 1, c)]);
      vC[r][c] = ct;
      constraints.push(ct);
    }
  }

  const TEAR_MIN_ROW = Math.floor(ROWS * 0.40);
  const TEAR_MAX_ROW = Math.floor(ROWS * 0.65);
  const pathRowAt = new Int32Array(COLS);
  {
    let r = TEAR_MIN_ROW + Math.floor(Math.random() * (TEAR_MAX_ROW - TEAR_MIN_ROW + 1));
    pathRowAt[0] = r;
    for (let c = 1; c < COLS; c++) {
      const roll = Math.random();
      let step = 0;
      if (roll < 0.18) step = -1;
      else if (roll < 0.36) step = 1;
      if (Math.random() < 0.08) step *= 2;
      r += step;
      if (r < TEAR_MIN_ROW) r = TEAR_MIN_ROW;
      if (r > TEAR_MAX_ROW) r = TEAR_MAX_ROW;
      pathRowAt[c] = r;
    }
  }

  const tearPath = [];
  for (let c = 0; c < COLS; c++) {
    const vEdge = vC[pathRowAt[c]][c];
    vEdge.tearable = true;
    vEdge.pathIndex = tearPath.length;
    tearPath.push(vEdge);

    if (c < COLS - 1) {
      const y0 = pathRowAt[c];
      const y1 = pathRowAt[c + 1];
      if (y1 > y0) {
        for (let rr = y0 + 1; rr <= y1; rr++) {
          const hEdge = hC[rr][c];
          hEdge.tearable = true;
          hEdge.pathIndex = tearPath.length;
          tearPath.push(hEdge);
        }
      } else if (y1 < y0) {
        for (let rr = y0; rr >= y1 + 1; rr--) {
          const hEdge = hC[rr][c];
          hEdge.tearable = true;
          hEdge.pathIndex = tearPath.length;
          tearPath.push(hEdge);
        }
      }
    }
  }
  const tearPathLen = tearPath.length;

  for (const p of points) {
    p.isTopHalf = (p.r <= pathRowAt[p.c]);
  }

  const pinAnchors = [];
  const pinByPoint = new Array(points.length).fill(null);
  for (const p of points) {
    if (!p.isTopHalf) continue;
    const pin = { p, ax: p.x, ay: p.y, broken: false };
    pinAnchors.push(pin);
    pinByPoint[p.i] = pin;
  }

  for (const p of points) {
    if (p.isTopHalf) continue;
    p.anchorX = p.x;
    p.anchorY = p.y;
  }

  const stress = new Float32Array(points.length);

  const topConstraints = [];
  const bottomConstraints = [];
  const crossConstraints = [];
  for (const ct of constraints) {
    const a = ct.p1.isTopHalf;
    const b = ct.p2.isTopHalf;
    if (a && b) topConstraints.push(ct);
    else if (!a && !b) bottomConstraints.push(ct);
    else crossConstraints.push(ct);
  }

  const GRAVITY          = 0.25;
  const FRICTION         = 0.95;
  const ITERATIONS       = 12;
  const TOP_STIFFNESS    = 1;
  const BOTTOM_STIFFNESS = 1;
  const CROSS_STIFFNESS  = 1;
  const PAD              = 2;
  const STRETCH_LIMIT    = 1.05;
  const STRESS_DECAY     = 0.88;
  const PIN_STRAIN_GAIN  = 0.3;
  const PIN_BREAK_STRESS = 20;
  const PIN_SPRING_K     = 0.3;
  const BOTTOM_SPRING_K  = 0.08;
  const BOTTOM_EXTRA_DAMP = 0.6;
  const BACK_MIN_COMPONENT = 3;
  const MAX_LAYER        = 2;
  const LAYER_MIN_COMPONENT = 3;

  const QROWS = ROWS - 1;
  const QCOLS = COLS - 1;
  const qIdx = (r, c) => r * QCOLS + c;

  const flipped        = new Uint8Array(QROWS * QCOLS);
  const compId         = new Int32Array(QROWS * QCOLS);
  const isBack         = new Uint8Array(QROWS * QCOLS);
  const layerIdx       = new Int32Array(QROWS * QCOLS);
  const layerCompId    = new Int32Array(QROWS * QCOLS);
  const layerCompSize  = [];
  const layerCompNewLayer = new Int32Array(QROWS * QCOLS);
  const layerCompNeighborCounts = new Int32Array(QROWS * QCOLS * (MAX_LAYER + 1));
  const compSize       = [];
  const floodQueue     = [];
  const layerQueue     = [];

  // ── Break-rate counter (audio) ───────────────────────────────────────────────

  let frameBreaks    = 0;   // incremented in satisfyPins + relaxConstraint
  let smoothBreakRate = 0;  // EMA-smoothed breaks/frame

  // ── Physics functions ────────────────────────────────────────────────────────

  function integrate() {
    for (const p of points) {
      if (p.pinned) continue;
      const vx = (p.x - p.old_x) * FRICTION;
      const vy = (p.y - p.old_y) * FRICTION;
      p.old_x = p.x;
      p.old_y = p.y;
      if (p.isTopHalf) {
        p.x += vx;
        p.y += vy + GRAVITY;
      } else {
        p.x += vx * BOTTOM_EXTRA_DAMP;
        p.y += vy * BOTTOM_EXTRA_DAMP;
        p.x += (p.anchorX - p.x) * BOTTOM_SPRING_K;
        p.y += (p.anchorY - p.y) * BOTTOM_SPRING_K;
      }
    }
  }

  function updateStress() {
    for (const pin of pinAnchors) {
      if (pin.broken) continue;
      const dx = pin.p.x - pin.ax;
      const dy = pin.p.y - pin.ay;
      stress[pin.p.i] += PIN_STRAIN_GAIN * Math.hypot(dx, dy);
    }
    for (let i = 0; i < stress.length; i++) stress[i] *= STRESS_DECAY;
  }

  function trackCursor() {
    if (!dragPoint) return;
    dragPoint.x = dragTargetX;
    dragPoint.y = dragTargetY;
    dragPoint.old_x = dragTargetX;
    dragPoint.old_y = dragTargetY;
  }

  function relaxConstraint(ct) {
    if (ct.broken) return;
    const dx = ct.p2.x - ct.p1.x;
    const dy = ct.p2.y - ct.p1.y;
    const dist = Math.hypot(dx, dy) || 0.0001;

    if (ct.tearable && dist > ct.restLength * STRETCH_LIMIT) {
      const pi = ct.pathIndex;
      const isEndpoint = (pi === 0 || pi === tearPathLen - 1);
      const prevBroken = pi > 0 && tearPath[pi - 1].broken;
      const nextBroken = pi < tearPathLen - 1 && tearPath[pi + 1].broken;
      if (isEndpoint || prevBroken || nextBroken) {
        ct.broken = true;
        frameBreaks++;   // ← audio: count this break
        return;
      }
    }

    const diff = (dist - ct.restLength) / dist;
    const p1Pinned = ct.p1.pinned;
    const p2Pinned = ct.p2.pinned;
    if (p1Pinned && p2Pinned) return;
    if (p1Pinned) {
      ct.p2.x -= dx * diff;
      ct.p2.y -= dy * diff;
    } else if (p2Pinned) {
      ct.p1.x += dx * diff;
      ct.p1.y += dy * diff;
    } else {
      const ox = dx * 0.5 * diff;
      const oy = dy * 0.5 * diff;
      ct.p1.x += ox;
      ct.p1.y += oy;
      ct.p2.x -= ox;
      ct.p2.y -= oy;
    }
  }

  function relaxGroup(group) {
    for (const ct of group) relaxConstraint(ct);
  }

  function satisfyPins() {
    for (const pin of pinAnchors) {
      if (pin.broken) continue;
      if (pin.p === dragPoint) continue;
      if (stress[pin.p.i] > PIN_BREAK_STRESS) {
        pin.broken = true;
        frameBreaks++;   // ← audio: count this break
        continue;
      }
      pin.p.x += (pin.ax - pin.p.x) * PIN_SPRING_K;
      pin.p.y += (pin.ay - pin.p.y) * PIN_SPRING_K;
    }
  }

  function satisfyConstraints() {
    for (let i = 0; i < ITERATIONS; i++) {
      trackCursor();
      for (let j = 0; j < TOP_STIFFNESS; j++) relaxGroup(topConstraints);
      for (let j = 0; j < BOTTOM_STIFFNESS; j++) relaxGroup(bottomConstraints);
      for (let j = 0; j < CROSS_STIFFNESS; j++) relaxGroup(crossConstraints);
      for (const p of points) {
        if (p.pinned) continue;
        if (p.x < PAD) p.x = PAD;
        else if (p.x > W - PAD) p.x = W - PAD;
        if (p.y < PAD) p.y = PAD;
        else if (p.y > H - PAD) p.y = H - PAD;
      }
    }
  }

  // ── Rendering (unchanged from Phase 7) ──────────────────────────────────────

  function quadAlive(r, c) {
    return !hC[r][c].broken
        && !hC[r + 1][c].broken
        && !vC[r][c].broken
        && !vC[r][c + 1].broken;
  }

  function quadSignedArea(p00, p01, p11, p10) {
    return 0.5 * (
      (p00.x * p01.y - p01.x * p00.y) +
      (p01.x * p11.y - p11.x * p01.y) +
      (p11.x * p10.y - p10.x * p11.y) +
      (p10.x * p00.y - p00.x * p10.y)
    );
  }

  function computeBackFacing() {
    flipped.fill(0);
    compId.fill(-1);
    isBack.fill(0);
    compSize.length = 0;

    for (let r = 0; r < QROWS; r++) {
      for (let c = 0; c < QCOLS; c++) {
        if (!quadAlive(r, c)) continue;
        const p00 = points[idx(r, c)];
        const p01 = points[idx(r, c + 1)];
        const p11 = points[idx(r + 1, c + 1)];
        const p10 = points[idx(r + 1, c)];
        if (quadSignedArea(p00, p01, p11, p10) < 0) {
          flipped[qIdx(r, c)] = 1;
        }
      }
    }

    for (let r = 0; r < QROWS; r++) {
      for (let c = 0; c < QCOLS; c++) {
        const startI = qIdx(r, c);
        if (!flipped[startI] || compId[startI] !== -1) continue;
        const id = compSize.length;
        compSize.push(1);
        compId[startI] = id;
        floodQueue.length = 0;
        floodQueue.push(startI);
        while (floodQueue.length) {
          const curr = floodQueue.pop();
          const rr = (curr / QCOLS) | 0;
          const cc = curr - rr * QCOLS;
          if (cc + 1 < QCOLS && !vC[rr][cc + 1].broken) {
            const j = qIdx(rr, cc + 1);
            if (flipped[j] && compId[j] === -1) { compId[j] = id; compSize[id]++; floodQueue.push(j); }
          }
          if (cc > 0 && !vC[rr][cc].broken) {
            const j = qIdx(rr, cc - 1);
            if (flipped[j] && compId[j] === -1) { compId[j] = id; compSize[id]++; floodQueue.push(j); }
          }
          if (rr + 1 < QROWS && !hC[rr + 1][cc].broken) {
            const j = qIdx(rr + 1, cc);
            if (flipped[j] && compId[j] === -1) { compId[j] = id; compSize[id]++; floodQueue.push(j); }
          }
          if (rr > 0 && !hC[rr][cc].broken) {
            const j = qIdx(rr - 1, cc);
            if (flipped[j] && compId[j] === -1) { compId[j] = id; compSize[id]++; floodQueue.push(j); }
          }
        }
      }
    }

    for (let i = 0; i < flipped.length; i++) {
      if (flipped[i] && compSize[compId[i]] >= BACK_MIN_COMPONENT) {
        isBack[i] = 1;
      }
    }
  }

  function computeLayers() {
    layerIdx.fill(-1);
    let maxSeen = 0;

    for (let c = 0; c < QCOLS; c++) {
      if (quadAlive(0, c)) { const i = qIdx(0, c); layerIdx[i] = 0; layerQueue.push(i); }
    }
    for (let c = 0; c < QCOLS; c++) {
      if (quadAlive(QROWS - 1, c)) {
        const i = qIdx(QROWS - 1, c);
        if (layerIdx[i] === -1) { layerIdx[i] = 0; layerQueue.push(i); }
      }
    }

    const drain = () => {
      while (layerQueue.length) {
        const curr = layerQueue.shift();
        const rr = (curr / QCOLS) | 0;
        const cc = curr - rr * QCOLS;
        const currLayer = layerIdx[curr];
        const currBack = isBack[curr];
        const tryVisit = (nr, nc, edgeOk) => {
          if (!edgeOk || nr < 0 || nr >= QROWS || nc < 0 || nc >= QCOLS) return;
          if (!quadAlive(nr, nc)) return;
          const j = qIdx(nr, nc);
          if (layerIdx[j] !== -1) return;
          const faceDiffers = isBack[j] !== currBack;
          let nextLayer = currLayer + (faceDiffers ? 1 : 0);
          if (nextLayer > MAX_LAYER) nextLayer = MAX_LAYER;
          layerIdx[j] = nextLayer;
          if (nextLayer > maxSeen) maxSeen = nextLayer;
          layerQueue.push(j);
        };
        tryVisit(rr, cc + 1, cc + 1 < QCOLS && !vC[rr][cc + 1].broken);
        tryVisit(rr, cc - 1, cc > 0 && !vC[rr][cc].broken);
        tryVisit(rr + 1, cc, rr + 1 < QROWS && !hC[rr + 1][cc].broken);
        tryVisit(rr - 1, cc, rr > 0 && !hC[rr][cc].broken);
      }
    };
    drain();

    for (let r = 0; r < QROWS; r++) {
      for (let c = 0; c < QCOLS; c++) {
        if (!quadAlive(r, c)) continue;
        const i = qIdx(r, c);
        if (layerIdx[i] !== -1) continue;
        layerIdx[i] = 0; layerQueue.push(i); drain();
      }
    }
    return maxSeen;
  }

  function filterLayerSpeckle() {
    layerCompId.fill(-1);
    layerCompSize.length = 0;

    for (let r = 0; r < QROWS; r++) {
      for (let c = 0; c < QCOLS; c++) {
        if (!quadAlive(r, c)) continue;
        const startI = qIdx(r, c);
        if (layerCompId[startI] !== -1) continue;
        const id = layerCompSize.length;
        const L = layerIdx[startI];
        layerCompId[startI] = id;
        layerCompSize.push(1);
        floodQueue.length = 0;
        floodQueue.push(startI);
        while (floodQueue.length) {
          const curr = floodQueue.pop();
          const rr = (curr / QCOLS) | 0;
          const cc = curr - rr * QCOLS;
          if (cc + 1 < QCOLS && !vC[rr][cc + 1].broken) {
            const j = qIdx(rr, cc + 1);
            if (quadAlive(rr, cc + 1) && layerCompId[j] === -1 && layerIdx[j] === L) { layerCompId[j] = id; layerCompSize[id]++; floodQueue.push(j); }
          }
          if (cc > 0 && !vC[rr][cc].broken) {
            const j = qIdx(rr, cc - 1);
            if (quadAlive(rr, cc - 1) && layerCompId[j] === -1 && layerIdx[j] === L) { layerCompId[j] = id; layerCompSize[id]++; floodQueue.push(j); }
          }
          if (rr + 1 < QROWS && !hC[rr + 1][cc].broken) {
            const j = qIdx(rr + 1, cc);
            if (quadAlive(rr + 1, cc) && layerCompId[j] === -1 && layerIdx[j] === L) { layerCompId[j] = id; layerCompSize[id]++; floodQueue.push(j); }
          }
          if (rr > 0 && !hC[rr][cc].broken) {
            const j = qIdx(rr - 1, cc);
            if (quadAlive(rr - 1, cc) && layerCompId[j] === -1 && layerIdx[j] === L) { layerCompId[j] = id; layerCompSize[id]++; floodQueue.push(j); }
          }
        }
      }
    }

    const stride = MAX_LAYER + 1;
    const numComps = layerCompSize.length;
    for (let k = 0; k < numComps * stride; k++) layerCompNeighborCounts[k] = 0;

    for (let r = 0; r < QROWS; r++) {
      for (let c = 0; c < QCOLS; c++) {
        if (!quadAlive(r, c)) continue;
        const i = qIdx(r, c);
        const id = layerCompId[i];
        if (layerCompSize[id] >= LAYER_MIN_COMPONENT) continue;
        const base = id * stride;
        if (c + 1 < QCOLS && !vC[r][c + 1].broken && quadAlive(r, c + 1)) { const j = qIdx(r, c + 1); if (layerCompId[j] !== id) layerCompNeighborCounts[base + layerIdx[j]]++; }
        if (c > 0 && !vC[r][c].broken && quadAlive(r, c - 1)) { const j = qIdx(r, c - 1); if (layerCompId[j] !== id) layerCompNeighborCounts[base + layerIdx[j]]++; }
        if (r + 1 < QROWS && !hC[r + 1][c].broken && quadAlive(r + 1, c)) { const j = qIdx(r + 1, c); if (layerCompId[j] !== id) layerCompNeighborCounts[base + layerIdx[j]]++; }
        if (r > 0 && !hC[r][c].broken && quadAlive(r - 1, c)) { const j = qIdx(r - 1, c); if (layerCompId[j] !== id) layerCompNeighborCounts[base + layerIdx[j]]++; }
      }
    }

    for (let id = 0; id < numComps; id++) {
      layerCompNewLayer[id] = -1;
      if (layerCompSize[id] >= LAYER_MIN_COMPONENT) continue;
      const base = id * stride;
      let bestL = -1, bestCount = 0;
      for (let k = 0; k < stride; k++) {
        const ct = layerCompNeighborCounts[base + k];
        if (ct > bestCount) { bestCount = ct; bestL = k; }
      }
      layerCompNewLayer[id] = bestL;
    }

    for (let r = 0; r < QROWS; r++) {
      for (let c = 0; c < QCOLS; c++) {
        if (!quadAlive(r, c)) continue;
        const i = qIdx(r, c);
        const newL = layerCompNewLayer[layerCompId[i]];
        if (newL !== -1) layerIdx[i] = newL;
      }
    }
  }

  const PAPER_FRONT = '#f5efe4';
  const PAPER_BACK  = '#c9bc9f';

  function drawQuadLayer(predicate) {
    offCtx.clearRect(0, 0, W, H);
    const frontPath = new Path2D();
    const backPath  = new Path2D();
    let hasFront = false, hasBack = false;
    for (let r = 0; r < QROWS; r++) {
      for (let c = 0; c < QCOLS; c++) {
        if (!quadAlive(r, c)) continue;
        if (!predicate(r, c)) continue;
        const p00 = points[idx(r, c)];
        const p01 = points[idx(r, c + 1)];
        const p11 = points[idx(r + 1, c + 1)];
        const p10 = points[idx(r + 1, c)];
        const back = isBack[qIdx(r, c)];
        const path = back ? backPath : frontPath;
        path.moveTo(p00.x, p00.y);
        path.lineTo(p01.x, p01.y);
        path.lineTo(p11.x, p11.y);
        path.lineTo(p10.x, p10.y);
        path.closePath();
        if (back) hasBack = true; else hasFront = true;
      }
    }
    if (hasFront) { offCtx.fillStyle = PAPER_FRONT; offCtx.fill(frontPath); }
    if (hasBack)  { offCtx.fillStyle = PAPER_BACK;  offCtx.fill(backPath); }
    return hasFront || hasBack;
  }

  const LAYER_SHADOWS = [
    { color: 'rgba(0,0,0,0.35)', blur: 10, offsetY: 4 },
    { color: 'rgba(0,0,0,0.55)', blur: 16, offsetY: 9 },
    { color: 'rgba(0,0,0,0.70)', blur: 22, offsetY: 14 },
  ];

  function blitLayer(shadow) {
    ctx.save();
    ctx.shadowColor   = shadow.color;
    ctx.shadowBlur    = shadow.blur;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = shadow.offsetY;
    ctx.drawImage(offCanvas, 0, 0);
    ctx.restore();
  }

  const letterBodyX = originX;
  const letterBodyY = originY + stripH;
  const letterBodyW = stripW;
  const letterBodyH = H - letterBodyY - 40;
  const textLineGap = 15;
  const textLineLefts = [];
  const textLineWidths = [];
  {
    const usableH = letterBodyH - 36;
    const numLines = Math.floor(usableH / textLineGap);
    for (let i = 0; i < numLines; i++) {
      textLineLefts.push(20 + Math.random() * 10);
      textLineWidths.push(0.55 + Math.random() * 0.4);
    }
  }

  function drawLetterBody() {
    ctx.save();
    ctx.shadowColor  = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur   = 16;
    ctx.shadowOffsetY = 8;
    ctx.fillStyle    = PAPER_FRONT;
    ctx.fillRect(letterBodyX, letterBodyY, letterBodyW, letterBodyH);
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(55, 45, 35, 0.32)';
    ctx.lineWidth = 1.4;
    for (let i = 0; i < textLineLefts.length; i++) {
      const y = letterBodyY + 22 + i * textLineGap;
      if (y > letterBodyY + letterBodyH - 16) break;
      const left  = letterBodyX + textLineLefts[i];
      const right = left + textLineWidths[i] * (letterBodyW - textLineLefts[i] - 25);
      ctx.beginPath();
      ctx.moveTo(left, y);
      ctx.lineTo(right, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPerforations() {
    ctx.save();
    ctx.strokeStyle = 'rgba(50, 40, 30, 0.45)';
    ctx.lineWidth = 0.9;
    ctx.setLineDash([2, 2.5]);
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < tearPathLen; i++) {
      const ct = tearPath[i];
      if (ct.broken) { started = false; continue; }
      const mx = (ct.p1.x + ct.p2.x) * 0.5;
      const my = (ct.p1.y + ct.p2.y) * 0.5;
      if (!started) { ctx.moveTo(mx, my); started = true; }
      else ctx.lineTo(mx, my);
    }
    ctx.stroke();
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawLetterBody();

    computeBackFacing();
    const maxLayer = computeLayers();
    filterLayerSpeckle();

    for (let L = 0; L <= maxLayer; L++) {
      const predicate = (r, c) => layerIdx[qIdx(r, c)] >= L;
      if (drawQuadLayer(predicate)) {
        blitLayer(LAYER_SHADOWS[Math.min(L, LAYER_SHADOWS.length - 1)]);
      }
    }

    drawPerforations();

    // Debug overlay (same as Phase 7, extended with audio status)
    let pinsBroken = 0;
    for (const pin of pinAnchors) {
      ctx.fillStyle = pin.broken ? 'rgba(40, 140, 240, 0.9)' : 'rgba(220, 50, 50, 0.9)';
      ctx.beginPath();
      ctx.arc(pin.p.x, pin.p.y, 1.6, 0, Math.PI * 2);
      ctx.fill();
      if (pin.broken) pinsBroken++;
    }

    let perfBroken = 0;
    for (const e of tearPath) if (e.broken) perfBroken++;

    ctx.save();
    ctx.font = '12px system-ui, sans-serif';
    ctx.textBaseline = 'top';
    const audioOk = audio.status.startsWith('rip') || audio.status === 'ready' || audio.status === 'silent' || audio.status.startsWith('decay');
    ctx.fillStyle = audio.status.includes('error') || audio.status.includes('failed')
      ? 'rgba(255,80,80,0.95)'
      : audio.status === 'loading' ? 'rgba(255,200,80,0.95)'
      : 'rgba(255,255,255,0.85)';
    ctx.fillText(
      `pins: ${pinsBroken}/${pinAnchors.length}   perf: ${perfBroken}/${tearPathLen}   audio: ${audio.status}`,
      8, 8,
    );
    ctx.restore();

    if (dragPoint) {
      ctx.fillStyle = 'rgba(40, 140, 200, 0.8)';
      ctx.beginPath();
      ctx.arc(dragPoint.x, dragPoint.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Drag handling ────────────────────────────────────────────────────────────

  let dragPoint   = null;
  let dragTargetX = 0;
  let dragTargetY = 0;

  function findNearest(mx, my) {
    let best = null, bestDist = Infinity;
    for (const p of points) {
      const d = (p.x - mx) ** 2 + (p.y - my) ** 2;
      if (d < bestDist) { bestDist = d; best = p; }
    }
    return best;
  }

  function canvasCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (W / rect.width),
      y: (clientY - rect.top)  * (H / rect.height),
    };
  }

  function startDrag(clientX, clientY) {
    audio.ensureContext();  // unlock AudioContext on first gesture
    const { x, y } = canvasCoords(clientX, clientY);
    dragPoint = findNearest(x, y);
    if (!dragPoint) return;
    const pin = pinByPoint[dragPoint.i];
    if (pin) pin.broken = true;
    dragPoint.pinned = true;
    dragTargetX = x;
    dragTargetY = y;
    canvas.classList.add('dragging');
  }

  function moveDrag(clientX, clientY) {
    if (!dragPoint) return;
    const { x, y } = canvasCoords(clientX, clientY);
    dragTargetX = x;
    dragTargetY = y;
  }

  function endDrag() {
    if (dragPoint && !dragPoint.fixed) {
      dragPoint.pinned = false;
      dragPoint.old_x  = dragPoint.x;
      dragPoint.old_y  = dragPoint.y;
    }
    dragPoint = null;
    canvas.classList.remove('dragging');
  }

  canvas.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
  window.addEventListener('mouseup',   endDrag);

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    startDrag(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchend', e => { e.preventDefault(); endDrag(); }, { passive: false });

  // ── Main loop ────────────────────────────────────────────────────────────────

  function loop() {
    frameBreaks = 0;          // reset before physics so satisfyPins/relaxConstraint can accumulate

    integrate();
    updateStress();
    satisfyConstraints();
    satisfyPins();

    // EMA-smooth the break count and drive audio.
    smoothBreakRate = smoothBreakRate * (1 - BREAK_SMOOTH) + frameBreaks * BREAK_SMOOTH;
    audio.update(smoothBreakRate);

    render();
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
